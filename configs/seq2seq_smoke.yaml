seed: 42

data:
  train_path: "data/English-French"
  dev_path: "data/English-French test"
  num_steps: 50
  batch_size: 32
  num_workers: 0
  pin_memory: false
  max_train_examples: 5000
  max_dev_examples: 500

model:
  type: "seq2seq"
  seq2seq:
    embed_size: 256
    num_hiddens: 256
    num_layers: 2
    dropout: 0.1
    bidirectional: true
    num_heads: 4

train:
  save_dir: "runs/seq2seq_smoke"
  lr: 0.0003
  epochs: 2
  warmup_steps: 400
  grad_clip: 1.0
  save_every_epochs: 1
  keep_last_k: 3
  eval_max_batches: 10
  eval_num_steps: 50

checkpoint:
  resume_from: null
  init_from: null
  weights_only: true